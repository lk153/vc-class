<div class="absolute -bottom-12 -left-12 w-80 h-80 bg-tertiary-container rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>

                Catalyst Learning
            </h1>
<p class="font-headline text-xl text-on-primary/90 font-semibold tracking-wide">

            </p>

<!-- Login Content Canvas -->
<main class="relative flex-grow flex flex-col px-4 -mt-12 z-20">
<!-- Glassmorphic Form Container -->
<div class="glass-card ghost-border rounded-xl p-8 shadow-2xl shadow-primary/10 flex flex-col w-full max-w-md mx-auto mb-10">
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-background mb-2 tracking-tight">Welcome back!</h2>
<p class="text-on-surface-variant text-sm font-medium">Please enter your details to continue your journey.</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-headline text-xs font-bold text-primary uppercase tracking-widest ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-container text-on-surface font-medium placeholder:text-on-surface-variant/50 transition-all" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center ml-1">
<label class="font-headline text-xs font-bold text-primary uppercase tracking-widest" for="password">Password</label>
<a class="text-xs font-bold text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-12 focus:ring-2 focus:ring-primary-container text-on-surface font-medium placeholder:text-on-surface-variant/50 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Login CTA -->
<button class="mt-4 w-full py-4 bg-gradient-to-r from-primary to-secondary text-on-primary font-headline font-extrabold text-lg rounded-full shadow-lg shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="relative my-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<span class="relative bg-white/50 backdrop-blur-sm px-4 text-xs font-bold text-on-surface-variant/60 uppercase tracking-widest">Or connect with</span>
</div>
<!-- Social Options Grid -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low rounded-full ghost-border hover:bg-surface-container-high transition-colors text-on-surface font-semibold text-sm">
